<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon MIDI - NO MP3</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

button {
    padding: 12px 20px;
    margin: 10px;
    font-size: 16px;
    background: #C7912B;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.piano {
    position: relative;
    width: 1000px;
    height: 200px;
    margin: auto;
}

.white {
    width: 40px;
    height: 200px;
    background: white;
    border: 1px solid #ccc;
    float: left;
}

.black {
    width: 25px;
    height: 120px;
    background: black;
    position: absolute;
    z-index: 2;
    margin-left: -12px;
}

.active {
    background: #C7912B !important;
}
</style>
</head>

<body>

<h2>🔔 CARILLON MIDI (bez MP3)</h2>

<button onclick="startAudio()">▶️ START DŹWIĘKU</button>
<button onclick="connectMIDI()">🔌 MIDI</button>

<div id="piano" class="piano"></div>

<script>

// ===== AUDIO ENGINE =====
let ctx;
let master;

function startAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    master.gain.value = 0.4;
    master.connect(ctx.destination);

    alert("Dźwięk gotowy 🔊");
}

// ===== DŹWIĘK DZWONU =====
function bell(note, velocity=1) {
    if (!ctx) return;

    const freq = 440 * Math.pow(2, (note - 69) / 12);

    // główny ton
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    // efekt "dzwonu"
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(velocity, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 2);

    osc.connect(gain);
    gain.connect(master);

    osc.start();
    osc.stop(ctx.currentTime + 2);
}

// ===== PIANO UI =====
const piano = document.getElementById("piano");

const startNote = 48;
const endNote = 84;

const whiteNotes = [0,2,4,5,7,9,11];
let keyMap = {};

function createPiano() {
    let whiteIndex = 0;

    for (let i = startNote; i <= endNote; i++) {
        const note = i % 12;

        if (whiteNotes.includes(note)) {
            const key = document.createElement("div");
            key.className = "white";
            piano.appendChild(key);
            keyMap[i] = key;
            whiteIndex++;
        } else {
            const key = document.createElement("div");
            key.className = "black";
            key.style.left = (whiteIndex * 40 - 12) + "px";
            piano.appendChild(key);
            keyMap[i] = key;
        }
    }
}

createPiano();

// ===== PLAY =====
function playNote(note, vel=1) {
    bell(note, vel);

    if (keyMap[note]) {
        keyMap[note].classList.add("active");
        setTimeout(()=>keyMap[note].classList.remove("active"), 200);
    }
}

// ===== MIDI =====
function connectMIDI() {
    if (!navigator.requestMIDIAccess) {
        alert("Użyj Chrome");
        return;
    }

    navigator.requestMIDIAccess().then(midi => {
        for (let input of midi.inputs.values()) {
            input.onmidimessage = (msg) => {
                const [cmd, note, vel] = msg.data;

                if (cmd === 144 && vel > 0) {
                    playNote(note, vel/127);
                }
            };
        }

        alert("MIDI podłączone 🎹");
    });
}

</script>

</body>
</html>
