<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon MP3 Chromatic</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

h2 {
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    background: #C7912B;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.piano {
    width: 1100px;
    margin: 20px auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}

.key {
    width: 60px;
    height: 140px;
    background: white;
    border: 1px solid #ccc;
    margin: 2px;
    cursor: pointer;
    font-size: 11px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 5px;
    user-select: none;
}

.key:active {
    background: #C7912B;
    color: white;
}
</style>
</head>

<body>

<h2>🔔 CARILLON MP3 (CHROMATIC)</h2>

<button onclick="connectMIDI()">🔌 MIDI</button>

<div id="piano" class="piano"></div>

<script>

// 🔔 JEDEN DŹWIĘK BAZOWY
const baseFile = "C3.mp3";

// 🎹 zakres (3 oktawy)
const startNote = 48;
const endNote = 84;

// 🎼 nazwy nut
const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","H"];

const piano = document.getElementById("piano");

// 🎹 tworzenie klawiatury
for (let i = startNote; i <= endNote; i++) {

    const note = i % 12;
    const octave = Math.floor(i / 12) - 1;

    const key = document.createElement("div");
    key.className = "key";

    key.innerHTML = `${names[note]}${octave}`;

    key.onclick = () => play(i);

    piano.appendChild(key);
}

// 🔔 PLAY (CHROMATYCZNY PITCH)
function play(note) {

    const audio = new Audio(baseFile);

    // 🎯 C3 = 60 jako punkt referencyjny
    const semitoneOffset = note - 60;

    // 🔥 poprawna skala 12-TET
    audio.playbackRate = Math.pow(2, semitoneOffset / 12);

    audio.play().catch(err => {
        console.log("Audio error:", err);
    });
}

// 🎹 MIDI
function connectMIDI() {

    if (!navigator.requestMIDIAccess) {
        alert("Brak MIDI (użyj Chrome)");
        return;
    }

    navigator.requestMIDIAccess().then(midi => {

        for (let input of midi.inputs.values()) {

            input.onmidimessage = (msg) => {
                const [cmd, note, vel] = msg.data;

                if (cmd === 144 && vel > 0) {
                    play(note);
                }
            };
        }

        alert("MIDI podłączone 🎹");
    });
}

</script>

</body>
</html>
