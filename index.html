<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon Kieczyński</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>

<style>
body {
    font-family: 'Montserrat', sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h2 {
    color: #4A4A4A;
    font-weight: 600;
    letter-spacing: 1px;
}

button {
    padding: 12px 22px;
    margin: 8px;
    background: #C7912B;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
}

button:hover {
    background: #b37d22;
}

.piano {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    width: 1100px;
    margin: 20px auto;
}

.key {
    width: 60px;
    height: 150px;
    background: #ffffff;
    border: 2px solid #e0e0e0;
    margin: 2px;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 11px;
    user-select: none;
    border-radius: 6px;
}

.key:active {
    background: #fff6e0;
}
</style>
</head>

<body>

<h2>CARILLON KIECZYŃSKI</h2>

<button onclick="initAudio()">▶ WŁĄCZ DŹWIĘK</button>
<button onclick="connectMIDI()">🔌 PODŁĄCZ MIDI</button>
<br>
<button onclick="startRecording()">⏺ NAGRYWAJ</button>
<button onclick="stopRecording()">⏹ STOP I ZAPISZ</button>

<div id="piano" class="piano"></div>

<script>

let ctx;
let buffer;
let masterGain;

// 🎙 NAGRYWANIE
let mediaDest;
let mediaRecorder;
let audioChunks = [];

// 🔊 INIT
async function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = ctx.createGain();
    masterGain.connect(ctx.destination);

    mediaDest = ctx.createMediaStreamDestination();
    masterGain.connect(mediaDest);

    const res = await fetch("C3.mp3");
    const arr = await res.arrayBuffer();
    buffer = await ctx.decodeAudioData(arr);

    alert("Audio gotowe 🔊");
}

// 🎼 PLAY
function play(note) {

    if (!buffer || !ctx) return;

    const source = ctx.createBufferSource();
    source.buffer = buffer;

    const semitone = note - 60;
    source.playbackRate.value = Math.pow(2, semitone / 12);

    source.connect(masterGain);
    source.start();
}

// 🎹 KLAWIATURA
const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","H"];
const piano = document.getElementById("piano");

for (let i = 48; i <= 84; i++) {
    const key = document.createElement("div");
    key.className = "key";
    key.innerText = names[i % 12] + (Math.floor(i / 12) - 1);
    key.onclick = () => play(i);
    piano.appendChild(key);
}

// 🎹 MIDI
function connectMIDI() {

    if (!navigator.requestMIDIAccess) {
        alert("Brak MIDI");
        return;
    }

    navigator.requestMIDIAccess().then(midi => {

        for (let input of midi.inputs.values()) {

            input.onmidimessage = (msg) => {
                const [cmd, note, vel] = msg.data;
                if (cmd === 144 && vel > 0) play(note);
            };
        }

        alert("MIDI podłączone 🎹");
    });
}

// 🔴 START REC
function startRecording() {

    if (!ctx) {
        alert("Najpierw włącz dźwięk!");
        return;
    }

    audioChunks = [];
    mediaRecorder = new MediaRecorder(mediaDest.stream);

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = exportMP3;

    mediaRecorder.start();
    alert("Nagrywanie rozpoczęte 🎙");
}

// ⏹ STOP
function stopRecording() {
    if (mediaRecorder) mediaRecorder.stop();
}

// 💾 MP3
async function exportMP3() {

    const blob = new Blob(audioChunks);
    const arrayBuffer = await blob.arrayBuffer();
    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);

    const samples = audioBuffer.getChannelData(0);
    const mp3encoder = new lamejs.Mp3Encoder(1, 44100, 128);

    let mp3Data = [];
    let blockSize = 1152;

    for (let i = 0; i < samples.length; i += blockSize) {
        let chunk = samples.subarray(i, i + blockSize);
        let mp3buf = mp3encoder.encodeBuffer(convert(chunk));
        if (mp3buf.length > 0) mp3Data.push(mp3buf);
    }

    let mp3buf = mp3encoder.flush();
    if (mp3buf.length > 0) mp3Data.push(mp3buf);

    const mp3Blob = new Blob(mp3Data, { type: 'audio/mp3' });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(mp3Blob);
    a.download = "nagranie.mp3";
    a.click();

    alert("Plik MP3 zapisany 🎧");
}

function convert(buffer) {
    let l = buffer.length;
    let buf = new Int16Array(l);
    while (l--) {
        buf[l] = Math.min(1, buffer[l]) * 0x7fff;
    }
    return buf;
}

</script>

</body>
</html>
