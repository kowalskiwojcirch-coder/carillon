<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon Piano PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: #f5f5f5;
    margin: 0;
    text-align: center;
    padding: 20px;
}

h2 {
    color: #4A4A4A;
    font-weight: 600;
    letter-spacing: 1px;
}

button {
    padding: 12px 22px;
    margin: 10px;
    background: #C7912B;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
    background: #b37d22;
}

.kontener {
    max-width: 1100px;
    margin: auto;
}

.piano {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 25px;
}

.key {
    width: 58px;
    height: 160px;
    background: #ffffff;
    border: 2px solid #e0e0e0;
    margin: 2px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 11px;
    color: #4A4A4A;
    font-weight: 600;
    user-select: none;
    transition: 0.15s;
}

.key:hover {
    border-color: #C7912B;
    box-shadow: 0 0 10px rgba(199,145,43,0.25);
}

.key:active {
    background: #fff6e0;
    transform: scale(0.98);
}
</style>
</head>

<body>

<div class="kontener">

<h2>🔔 CARILLON PIANO</h2>

<button onclick="initAudio()">▶ START AUDIO</button>
<button onclick="connectMIDI()">🔌 MIDI</button>

<div id="piano" class="piano"></div>

</div>

<script>

let ctx;
let buffer;

// 🔊 LOAD SAMPLE
async function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    const res = await fetch("C3.mp3");
    const arr = await res.arrayBuffer();
    buffer = await ctx.decodeAudioData(arr);

    alert("Audio gotowe 🔊");
}

// 🔔 PLAY (dłuższy, naturalny carillon)
function play(note) {

    if (!ctx || !buffer) return;

    const source = ctx.createBufferSource();
    const gain = ctx.createGain();

    source.buffer = buffer;

    // 🎹 dokładna skala pianina (12-TET)
    const semitone = note - 60;
    source.playbackRate.value = Math.pow(2, semitone / 12);

    // 🔔 DŁUŻSZE WYBRZMIEWANIE (carillon feel)
    gain.gain.setValueAtTime(0.95, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 2.6);

    source.connect(gain);
    gain.connect(ctx.destination);

    source.start();
}

// 🎹 SKALA
const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","H"];

const piano = document.getElementById("piano");

const start = 48;
const end = 84;

// 🎹 UI
for (let i = start; i <= end; i++) {

    const n = names[i % 12];
    const octave = Math.floor(i / 12) - 1;

    const key = document.createElement("div");
    key.className = "key";
    key.innerText = n + octave;

    key.onclick = () => play(i);

    piano.appendChild(key);
}

// 🎹 MIDI
function connectMIDI() {

    if (!navigator.requestMIDIAccess) {
        alert("Brak MIDI");
        return;
    }

    navigator.requestMIDIAccess().then(midi => {

        for (let input of midi.inputs.values()) {

            input.onmidimessage = (msg) => {
                const [cmd, note, vel] = msg.data;

                if (cmd === 144 && vel > 0) {
                    play(note);
                }
            };
        }

        alert("MIDI OK 🎹");
    });
}

</script>

</body>
</html>
