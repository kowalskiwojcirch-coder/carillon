<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>CARILLON FIX</title>
<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }

button {
  padding: 15px 25px;
  margin: 10px;
  background:#C7912B;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.piano {
  width: 900px;
  height: 200px;
  margin:auto;
}

.key {
  display:inline-block;
  width:40px;
  height:180px;
  background:white;
  border:1px solid #ccc;
  margin:1px;
}
</style>
</head>

<body>

<h2>🔔 CARILLON FIX TEST</h2>

<button onclick="unlock()">▶ START AUDIO (WAŻNE)</button>
<button onclick="midi()">🔌 MIDI</button>

<div class="piano" id="piano"></div>

<script>

let ctx;
let master;

// 🔊 100% pewny test dźwięku
function unlock(){
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    master.connect(ctx.destination);
    master.gain.value = 0.4;

    // TEST SOUND
    const osc = ctx.createOscillator();
    osc.frequency.value = 440;
    osc.connect(master);
    osc.start();
    osc.stop(ctx.currentTime + 0.3);

    alert("JEŚLI SŁYSZYSZ BEEP → AUDIO DZIAŁA");
}

// 🔔 CARILLON SOUND
function play(note){

    const freq = 261.63 * Math.pow(2, (note-60)/12);

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.5, ctx.currentTime+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+2);

    osc.connect(gain);
    gain.connect(master);

    osc.start();
    osc.stop(ctx.currentTime+2);
}

// 🎹 TEST KLAWISZE (BEZ MIDI NA START)
const piano = document.getElementById("piano");

for(let i=60;i<72;i++){
    const k = document.createElement("div");
    k.className="key";
    k.innerText=i;

    k.onclick = () => play(i);

    piano.appendChild(k);
}

// 🎹 MIDI
function midi(){
    navigator.requestMIDIAccess().then(m=>{
        for(let input of m.inputs.values()){
            input.onmidimessage = e=>{
                const [cmd,note,vel] = e.data;
                if(cmd===144 && vel>0){
                    play(note);
                }
            }
        }
        alert("MIDI OK");
    });
}

</script>

</body>
</html>
