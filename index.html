<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon MIDI Piano</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

button {
    padding: 12px 20px;
    margin: 20px;
    font-size: 16px;
    background: #C7912B;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.piano {
    position: relative;
    width: 1000px;
    height: 200px;
    margin: auto;
}

.white {
    width: 40px;
    height: 200px;
    background: white;
    border: 1px solid #ccc;
    float: left;
    position: relative;
    z-index: 1;
}

.black {
    width: 25px;
    height: 120px;
    background: black;
    position: absolute;
    z-index: 2;
    margin-left: -12px;
}

.active {
    background: #C7912B !important;
}
</style>
</head>

<body>

<h2>🎹 Carillon MIDI</h2>
<button onclick="startAudio()">▶️ Włącz dźwięk</button>
<button onclick="connectMIDI()">🔌 Podłącz keyboard (MIDI)</button>

<div id="piano" class="piano"></div>

<script>
// --- AUDIO ENGINE (działa zawsze) ---
let audioCtx;
let masterGain;

function startAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.3;
    masterGain.connect(audioCtx.destination);
    alert("Dźwięk włączony 🔊");
}

// --- OPCJONALNY MP3 ---
const baseFile = "C3.mp3"; // możesz dodać plik lub zostawić

// --- PIANO ---
const piano = document.getElementById("piano");

const startNote = 48;
const endNote = 84;

const whiteNotes = [0,2,4,5,7,9,11];
let keyMap = {};
let activeOsc = {};

function createPiano() {
    let whiteIndex = 0;

    for (let i = startNote; i <= endNote; i++) {
        const note = i % 12;

        if (whiteNotes.includes(note)) {
            const key = document.createElement("div");
            key.className = "white";
            key.dataset.note = i;
            piano.appendChild(key);

            keyMap[i] = key;
            whiteIndex++;
        } else {
            const key = document.createElement("div");
            key.className = "black";
            key.dataset.note = i;
            key.style.left = (whiteIndex * 40 - 12) + "px";

            piano.appendChild(key);
            keyMap[i] = key;
        }
    }
}

createPiano();

// --- PLAY ---
function playNote(note, velocity=1) {
    if (!audioCtx) return;

    const freq = 440 * Math.pow(2, (note - 69) / 12);

    // 🔊 WebAudio (zawsze działa)
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    gain.gain.value = velocity;

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start();

    activeOsc[note] = {osc, gain};

    // 🎨 wizual
    if (keyMap[note]) keyMap[note].classList.add("active");

    // 🔔 opcjonalny MP3 (jeśli istnieje)
    const audio = new Audio(baseFile);
    audio.playbackRate = Math.pow(2, (note - 60) / 12);
    audio.volume = 0.3;
    audio.play().catch(()=>{});
}

function stopNote(note) {
    if (activeOsc[note]) {
        activeOsc[note].gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
        activeOsc[note].osc.stop(audioCtx.currentTime + 0.3);
        delete activeOsc[note];
    }

    if (keyMap[note]) keyMap[note].classList.remove("active");
}

// --- MIDI ---
function connectMIDI() {
    if (!navigator.requestMIDIAccess) {
        alert("Użyj Chrome!");
        return;
    }

    navigator.requestMIDIAccess().then(midi => {
        for (let input of midi.inputs.values()) {
            console.log("🎹", input.name);

            input.onmidimessage = (msg) => {
                const [cmd, note, velocity] = msg.data;

                if (cmd === 144 && velocity > 0) {
                    playNote(note, velocity / 127);
                } else if (cmd === 128 || velocity === 0) {
                    stopNote(note);
                }
            };
        }

        alert("Keyboard podłączony 🎹");
    });
}
</script>

</body>
</html>
