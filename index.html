<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon Piano</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    text-align: center;
}

button {
    padding: 12px 20px;
    margin: 10px;
    background: #C7912B;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.piano {
    position: relative;
    width: 1050px;
    height: 220px;
    margin: auto;
}

.white {
    width: 50px;
    height: 220px;
    background: white;
    border: 1px solid #ccc;
    float: left;
    position: relative;
    z-index: 1;
}

.black {
    width: 30px;
    height: 140px;
    background: black;
    position: absolute;
    z-index: 2;
    margin-left: -15px;
}

.active {
    background: #C7912B !important;
}
</style>
</head>

<body>

<h2>🔔 CARILLON PIANO</h2>

<button onclick="start()">▶ START AUDIO</button>
<button onclick="connectMIDI()">🔌 MIDI</button>

<div id="piano" class="piano"></div>

<script>

// ===== AUDIO =====
let ctx;
let master;

function start() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    master.gain.value = 0.4;
    master.connect(ctx.destination);

    alert("Audio OK 🔊");
}

// ===== SKALA CHROMATYCZNA =====
const notesNames = [
    "C","C#","D","D#","E","F",
    "F#","G","G#","A","A#","H"
];

// ===== PIANO =====
const piano = document.getElementById("piano");

const startNote = 48; // C3
const endNote = 84;

const whiteKeys = [0,2,4,5,7,9,11];
let keyMap = {};
let whiteIndex = 0;

function buildPiano() {

    for (let i = startNote; i <= endNote; i++) {

        const note = i % 12;

        const key = document.createElement("div");

        if (whiteKeys.includes(note)) {
            key.className = "white";
            piano.appendChild(key);
            keyMap[i] = key;
            whiteIndex++;
        } else {
            key.className = "black";
            key.style.left = (whiteIndex * 50 - 15) + "px";
            piano.appendChild(key);
            keyMap[i] = key;
        }
    }
}

buildPiano();

// ===== DŹWIĘK CARILLON (PITCH Z C) =====
function playNote(note, velocity=1) {
    if (!ctx) return;

    // 🔥 CARILLON: wszystko z C (pitch shifting)
    const baseC = 261.63;
    const freq = baseC * Math.pow(2, (note - 60) / 12);

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "sine";
    osc.frequency.value = freq;

    // dzwonowy decay
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(velocity, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 2.5);

    osc.connect(gain);
    gain.connect(master);

    osc.start();
    osc.stop(ctx.currentTime + 2.5);

    if (keyMap[note]) {
        keyMap[note].classList.add("active");
        setTimeout(()=>keyMap[note].classList.remove("active"), 150);
    }
}

// ===== MIDI =====
function connectMIDI() {
    navigator.requestMIDIAccess().then(midi => {
        for (let input of midi.inputs.values()) {

            input.onmidimessage = (msg) => {
                const [cmd, note, vel] = msg.data;

                if (cmd === 144 && vel > 0) {
                    playNote(note, vel/127);
                }
            };
        }

        alert("MIDI OK 🎹");
    });
}

</script>

</body>
</html>
