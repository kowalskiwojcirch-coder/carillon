<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon MP3 Only</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

button {
    padding: 12px 20px;
    margin: 10px;
    background: #C7912B;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.piano {
    width: 900px;
    margin: auto;
    display: flex;
    flex-wrap: wrap;
}

.key {
    width: 60px;
    height: 120px;
    background: white;
    border: 1px solid #ccc;
    margin: 2px;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>🔔 CARILLON (MP3 ONLY)</h2>

<button onclick="midi()">🔌 MIDI</button>

<div id="piano" class="piano"></div>

<script>

// 🔔 JEDYNY DŹWIĘK
const baseFile = "C3.mp3";

// 🎹 zakres
const start = 48;
const end = 72;

const piano = document.getElementById("piano");

// 🎹 tworzenie klawiszy
for (let i = start; i <= end; i++) {
    const k = document.createElement("div");
    k.className = "key";

    k.innerText = i;

    k.onclick = () => play(i);

    piano.appendChild(k);
}

// 🔔 PLAY MP3 Z PITCH
function play(note) {
    const audio = new Audio(baseFile);

    // carillon pitch (C jako baza)
    audio.playbackRate = Math.pow(2, (note - 60) / 12);

    audio.play().catch(err => {
        console.log("Błąd audio:", err);
    });
}

// 🎹 MIDI
function midi() {
    navigator.requestMIDIAccess().then(midi => {
        for (let input of midi.inputs.values()) {
            input.onmidimessage = (msg) => {
                const [cmd, note, vel] = msg.data;

                if (cmd === 144 && vel > 0) {
                    play(note);
                }
            };
        }

        alert("MIDI OK");
    });
}

</script>

</body>
</html>
