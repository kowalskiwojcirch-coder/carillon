<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Piano Carillon PRO</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

button {
    padding: 12px 20px;
    margin: 10px;
    background: #C7912B;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.piano {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    width: 1100px;
    margin: 20px auto;
}

.key {
    width: 60px;
    height: 140px;
    background: white;
    border: 1px solid #ccc;
    margin: 2px;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 11px;
    user-select: none;
}

.key:active {
    background: #C7912B;
    color: white;
}
</style>
</head>

<body>

<h2>🎹 PIANO CARILLON PRO</h2>

<button onclick="initAudio()">▶ START AUDIO</button>
<button onclick="connectMIDI()">🔌 MIDI</button>

<div id="piano" class="piano"></div>

<script>

let ctx;
let buffer;

// 🔥 LOAD SAMPLE ONCE
async function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    const res = await fetch("C3.mp3");
    const arr = await res.arrayBuffer();
    buffer = await ctx.decodeAudioData(arr);

    alert("Audio gotowe 🔊");
}

// 🎼 PLAY (prawdziwy pitch jak pianino)
function play(note) {

    if (!buffer || !ctx) return;

    const source = ctx.createBufferSource();
    const gain = ctx.createGain();

    source.buffer = buffer;

    // 🎹 12-TET (dokładna skala pianina)
    const semitone = note - 60;
    source.playbackRate.value = Math.pow(2, semitone / 12);

    gain.gain.value = 0.6;

    source.connect(gain);
    gain.connect(ctx.destination);

    source.start();
}

// 🎹 PIANO UI (C C# D ...)
const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","H"];

const piano = document.getElementById("piano");

const start = 48;
const end = 84;

for (let i = start; i <= end; i++) {

    const noteName = names[i % 12];
    const octave = Math.floor(i / 12) - 1;

    const key = document.createElement("div");
    key.className = "key";
    key.innerText = noteName + octave;

    key.onclick = () => play(i);

    piano.appendChild(key);
}

// 🎹 MIDI
function connectMIDI() {

    if (!navigator.requestMIDIAccess) {
        alert("Brak MIDI");
        return;
    }

    navigator.requestMIDIAccess().then(midi => {

        for (let input of midi.inputs.values()) {

            input.onmidimessage = (msg) => {
                const [cmd, note, vel] = msg.data;

                if (cmd === 144 && vel > 0) {
                    play(note);
                }
            };
        }

        alert("MIDI OK 🎹");
    });
}

</script>

</body>
</html>
