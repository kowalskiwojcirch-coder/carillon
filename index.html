<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Carillon Kieczysński</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.0/lame.min.js"></script>

<style>
body {
    font-family: 'Montserrat', sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

/* 🔐 pasek hasła */
#loginBar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #C7912B;
    color: white;
    padding: 10px;
    z-index: 999;
}

#loginBar input {
    padding: 6px;
    border-radius: 6px;
    border: none;
    margin-left: 10px;
}

#loginBar button {
    padding: 6px 12px;
    margin-left: 5px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
}

#app {
    display: none;
}

h2 {
    color: #4A4A4A;
    font-weight: 600;
    letter-spacing: 1px;
    margin-top: 10px;
}

button {
    padding: 12px 22px;
    margin: 10px;
    background: #C7912B;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
    background: #b37d22;
}

.piano {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    width: 1100px;
    margin: 20px auto;
}

.key {
    width: 60px;
    height: 150px;
    background: #ffffff;
    border: 2px solid #e0e0e0;
    margin: 2px;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 11px;
    user-select: none;
    color: #4A4A4A;
    font-weight: 600;
    border-radius: 6px;
    transition: 0.15s;
}

.key:hover {
    border-color: #C7912B;
    box-shadow: 0 0 10px rgba(199,145,43,0.25);
}

.key:active {
    background: #fff6e0;
    transform: scale(0.97);
}
</style>
</head>

<body>

<!-- 🔐 LOGIN BAR -->
<div id="loginBar">
    🔐 Podaj hasło:
    <input type="password" id="pass">
    <button onclick="checkPassword()">OK</button>
    <span id="msg"></span>
</div>

<!-- 🔊 APP -->
<div id="app">

<h2> CARILLON KIECZYŃSKI</h2>

<button onclick="initAudio()">▶ WŁĄCZ DŻWIĘK </button>
<button onclick="connectMIDI()">🔌 PODŁĄCZ MIDI</button>
<button onclick="startRecording()">⏺ NAGRYWAJ</button>
<button onclick="stopRecording()">⏹ STOP I ZAPISZ</button>

<div id="piano" class="piano"></div>

</div>

<script>

// 🔐 HASŁO
const PASSWORD = "kieczynskicarillon";

function checkPassword() {
    const val = document.getElementById("pass").value;

    if (val === PASSWORD) {
        document.getElementById("loginBar").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        document.getElementById("msg").innerText = " ❌ Złe hasło";
    }
}

let ctx;
let buffer;
let masterGain;

let mediaDest;
let mediaRecorder;
let audioChunks = [];

// 🔊 INIT
async function initAudio() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = ctx.createGain();
    masterGain.connect(ctx.destination);

    mediaDest = ctx.createMediaStreamDestination();
    masterGain.connect(mediaDest);

    const res = await fetch("C3.mp3");
    const arr = await res.arrayBuffer();
    buffer = await ctx.decodeAudioData(arr);

    alert("Audio gotowe 🔊");
}

// 🎼 PLAY
function play(note) {

    if (!buffer || !ctx) return;

    const source = ctx.createBufferSource();
    source.buffer = buffer;

    const semitone = note - 60;
    source.playbackRate.value = Math.pow(2, semitone / 12);

    const gain = ctx.createGain();
    gain.gain.value = 0.6;

    source.connect(gain);
    gain.connect(masterGain);

    source.start();
}

// 🎹 UI
const names = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","H"];
const piano = document.getElementById("piano");

for (let i = 48; i <= 84; i++) {
    const key = document.createElement("div");
    key.className = "key";
    key.innerText = names[i % 12] + (Math.floor(i / 12) - 1);
    key.onclick = () => play(i);
    piano.appendChild(key);
}

// 🎹 MIDI
function connectMIDI() {

    if (!navigator.requestMIDIAccess) {
        alert("Brak MIDI");
        return;
    }

    navigator.requestMIDIAccess().then(midi => {

        for (let input of midi.inputs.values()) {

            input.onmidimessage = (msg) => {
                const [cmd, note, vel] = msg.data;

                if (cmd === 144 && vel > 0) {
                    play(note);
                }
            };
        }

        alert("MIDI OK 🎹");
    });
}

// 🔴 REC
function startRecording() {

    if (!ctx) return;

    audioChunks = [];
    mediaRecorder = new MediaRecorder(mediaDest.stream);

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = exportMP3;

    mediaRecorder.start();

    alert("Nagrywanie start 🎙");
}

function stopRecording() {
    if (mediaRecorder) mediaRecorder.stop();
}

// 💾 MP3
async function exportMP3() {

    const blob = new Blob(audioChunks);
    const arrayBuffer = await blob.arrayBuffer();
    const audioBuffer = await ctx.decodeAudioData(arrayBuffer);

    const samples = audioBuffer.getChannelData(0);
    const mp3encoder = new lamejs.Mp3Encoder(1, 44100, 128);

    let mp3Data = [];
    let blockSize = 1152;

    for (let i = 0; i < samples.length; i += blockSize) {
        let chunk = samples.subarray(i, i + blockSize);
        let mp3buf = mp3encoder.encodeBuffer(convert(chunk));
        if (mp3buf.length > 0) mp3Data.push(mp3buf);
    }

    let mp3buf = mp3encoder.flush();
    if (mp3buf.length > 0) mp3Data.push(mp3buf);

    const mp3Blob = new Blob(mp3Data, { type: 'audio/mp3' });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(mp3Blob);
    a.download = "nagranie.mp3";
    a.click();

    alert("Zapisano MP3 🎧");
}

function convert(buffer) {
    let l = buffer.length;
    let buf = new Int16Array(l);
    while (l--) {
        buf[l] = Math.min(1, buffer[l]) * 0x7fff;
    }
    return buf;
}

</script>

</body>
</html>

Instrukcja : 
-Urządzenia mobilne- (wystarczy kliknąć "Włącz dźwięk")

-Urządzenia PC- (najpierw kliknij "Podłącz Midi" do keyboarda a następnie kliknij "Włącz dźwięk")
